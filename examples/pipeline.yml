# Example Azure DevOps pipeline using the AI PR Reviewer task.
#
# SCENARIO: Runs on every pull request, posts an AI review, and optionally
# adds a manual comment with build results. Adapt the provider/inputs to
# match your repository (see github-pipeline.yml, gitlab-pipeline.yml, or
# bitbucket-pipeline.yml for provider-specific examples).

trigger: none

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  # Store sensitive values as secret pipeline variables, not here.
  TARGET_REPO: myorg/myrepo
  AI_MODEL: claude-sonnet-4-6

stages:
  - stage: PullRequest
    displayName: AI Review PR
    jobs:
      - job: ReviewPR
        displayName: Review PR with AI
        steps:
          # ── Example 1: Review open PR with AI ────────────────────────────────
          - task: AiPrReviewer@1
            displayName: AI Review PR
            inputs:
              action: reviewPR
              provider: github
              accessToken: $(GITHUB_PAT)           # secret variable
              repository: $(TARGET_REPO)
              prNumber: $(System.PullRequest.PullRequestNumber)
              enableAiReview: true
              aiApiKey: $(ANTHROPIC_API_KEY)        # secret variable
              aiModel: $(AI_MODEL)
              aiReviewContext: "Focus on security issues and breaking changes."
              aiMaxDiffLines: 500

          - script: echo "PR URL = $(PrUrl) | PR Number = $(System.PullRequest.PullRequestNumber)"
            displayName: Print PR info

          # ── Example 2: Post a manual comment on the same PR ──────────────────
          - task: AiPrReviewer@1
            displayName: Post Pipeline Status Comment
            condition: always()
            inputs:
              action: commentPR
              provider: github
              accessToken: $(GITHUB_PAT)
              repository: $(TARGET_REPO)
              prNumber: $(System.PullRequest.PullRequestNumber)
              commentBody: |
                ## Pipeline Status
                Build **$(Build.BuildNumber)** completed with status: **$(Agent.JobStatus)**.
                [View pipeline run]($(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId))
