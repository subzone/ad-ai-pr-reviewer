# Functional test pipeline for ad-ai-pr-reviewer — runs on Azure DevOps.
#
# PURPOSE: Validates the task code end-to-end against this repo itself.
#          Runs the compiled Node script directly (no Marketplace install needed).
#
# REQUIRED pipeline variables (set as secret in ADO pipeline UI):
#   GITHUB_PAT         — GitHub PAT with repo + pull_requests read/write scope
#   ANTHROPIC_API_KEY  — Anthropic API key
#
# OPTIONAL pipeline variables:
#   TEST_PR_NUMBER     — An existing open PR number to run Job 1 against
#                        (leave empty to skip Job 1)

trigger: none   # manual only

pool:
  vmImage: ubuntu-latest

variables:
  TEST_REPO: subzone/ad-ai-pr-reviewer
  TEST_PR_NUMBER: ''    # set in ADO pipeline UI to test reviewPR on existing PR
  AI_MODEL: claude-sonnet-4-6

stages:
  - stage: Test
    displayName: Test AI PR Reviewer task
    jobs:

      # ── Job 1: AI review an existing PR (optional) ────────────────────────
      - job: TestReviewPR
        displayName: AI Review existing PR
        condition: ne(variables['TEST_PR_NUMBER'], '')
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install task dependencies
            workingDirectory: task

          - script: npm run build
            displayName: Build TypeScript
            workingDirectory: task

          - script: node task/dist/index.js
            displayName: Run task — reviewPR
            env:
              INPUT_ACTION: reviewPR
              INPUT_PROVIDER: github
              INPUT_ACCESSTOKEN: $(GITHUB_PAT)
              INPUT_REPOSITORY: $(TEST_REPO)
              INPUT_PRNUMBER: $(TEST_PR_NUMBER)
              INPUT_ENABLEAIREVIEW: true
              INPUT_AIAPIKEY: $(ANTHROPIC_API_KEY)
              INPUT_AIMODEL: $(AI_MODEL)
              INPUT_AIREVIEWCONTEXT: "This is a test run from Azure DevOps CI."
              INPUT_AIMAXDIFFLINES: "300"
              AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)
              SYSTEM_DEFAULTWORKINGDIRECTORY: $(System.DefaultWorkingDirectory)

      # ── Job 2: create branch → commit → createPR → AI review → cleanup ───
      - job: TestCreateAndReview
        displayName: Create PR + AI Review + Cleanup
        dependsOn: []
        variables:
          SOURCE_BRANCH: test/ado-ai-reviewer-$(Build.BuildId)
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install task dependencies
            workingDirectory: task

          - script: npm run build
            displayName: Build TypeScript
            workingDirectory: task

          - script: |
              set -e
              REPO="$(TEST_REPO)"
              BRANCH="$(SOURCE_BRANCH)"

              echo "=== Repo: $REPO ==="
              echo "=== Branch: $BRANCH ==="

              # Verify PAT and repo access
              echo "--- Verifying repo access ---"
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -H "Authorization: Bearer $GITHUB_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO")
              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
              echo "Repo access status: $HTTP_STATUS"
              if [ "$HTTP_STATUS" != "200" ]; then
                echo "Cannot access repo — check PAT scopes and repo name"
                echo "Error: $BODY"
                exit 1
              fi
              echo "Repo access OK: $(echo "$BODY" | jq -r '.full_name')"

              # Get main branch SHA
              echo "--- Getting main branch SHA ---"
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
                -H "Authorization: Bearer $GITHUB_PAT" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/branches/main")
              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
              echo "Status: $HTTP_STATUS"
              if [ "$HTTP_STATUS" != "200" ]; then
                echo "Error response: $BODY"
                exit 1
              fi
              SHA=$(echo "$BODY" | jq -r '.commit.sha')
              echo "SHA: $SHA"

              # Create test branch
              echo "--- Creating branch $BRANCH ---"
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
                -H "Authorization: Bearer $GITHUB_PAT" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/$REPO/git/refs" \
                -d "{\"ref\":\"refs/heads/$BRANCH\",\"sha\":\"$SHA\"}")
              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
              echo "Status: $HTTP_STATUS"
              if [ "$HTTP_STATUS" != "201" ]; then
                echo "Error response: $BODY"
                exit 1
              fi

              # Push a trivial commit so the branch has a real diff
              echo "--- Pushing test commit ---"
              CONTENT=$(printf '# ADO AI Reviewer test\nBuild: %s\n' "$(Build.BuildId)" | base64 -w0)
              RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PUT \
                -H "Authorization: Bearer $GITHUB_PAT" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/$REPO/contents/test-artifacts/ado-test-$(Build.BuildId).md" \
                -d "{\"message\":\"test: ADO AI reviewer run $(Build.BuildId)\",\"content\":\"$CONTENT\",\"branch\":\"$BRANCH\"}")
              HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
              BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
              echo "Status: $HTTP_STATUS"
              if [ "$HTTP_STATUS" != "201" ]; then
                echo "Error response: $BODY"
                exit 1
              fi

              echo "##vso[task.setvariable variable=TEST_BRANCH]$BRANCH"
              echo "Test branch ready: $BRANCH"
            displayName: Create test branch + commit
            env:
              GITHUB_PAT: $(GITHUB_PAT)

          - script: node task/dist/index.js
            displayName: Run task — createPR + AI Review
            name: createPR
            env:
              INPUT_ACTION: createPR
              INPUT_PROVIDER: github
              INPUT_ACCESSTOKEN: $(GITHUB_PAT)
              INPUT_REPOSITORY: $(TEST_REPO)
              INPUT_SOURCEBRANCH: $(SOURCE_BRANCH)
              INPUT_TARGETBRANCH: main
              INPUT_PRTITLE: "[ADO Test] AI Reviewer test run #$(Build.BuildId)"
              INPUT_PRDESCRIPTION: |
                Automated test PR created by Azure DevOps pipeline to validate the AI PR Reviewer extension.
                Build: $(Build.BuildNumber)

                > This PR will be closed automatically after the test completes.
              INPUT_ENABLEAIREVIEW: true
              INPUT_AIAPIKEY: $(ANTHROPIC_API_KEY)
              INPUT_AIMODEL: $(AI_MODEL)
              INPUT_AIREVIEWCONTEXT: "This is an automated functional test of the AI PR Reviewer ADO extension. Briefly acknowledge the change and confirm the review pipeline is working correctly."
              INPUT_AIMAXDIFFLINES: "100"
              INPUT_FAILONEXISTINGPR: false
              AGENT_TEMPDIRECTORY: $(Agent.TempDirectory)
              SYSTEM_DEFAULTWORKINGDIRECTORY: $(System.DefaultWorkingDirectory)

          - script: |
              echo "PR URL:    $(createPR.PrUrl)"
              echo "PR Number: $(createPR.PrNumber)"
            displayName: Print created PR info

          # Close test PR and delete branch to keep the repo clean
          - script: |
              set -e
              REPO="$(TEST_REPO)"
              PR_NUMBER="$(createPR.PrNumber)"
              BRANCH="$(SOURCE_BRANCH)"

              if [ -z "$PR_NUMBER" ]; then
                echo "No PR number captured, skipping cleanup."
                exit 0
              fi

              echo "Closing PR #$PR_NUMBER..."
              curl -sf -X PATCH \
                -H "Authorization: Bearer $GITHUB_PAT" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" \
                -d '{"state":"closed"}'

              echo "Deleting branch $BRANCH..."
              curl -sf -X DELETE \
                -H "Authorization: Bearer $GITHUB_PAT" \
                "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH"

              echo "Cleanup done."
            displayName: Close PR + delete test branch
            condition: always()
            env:
              GITHUB_PAT: $(GITHUB_PAT)
