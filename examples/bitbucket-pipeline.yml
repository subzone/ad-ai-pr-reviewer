# Azure DevOps pipeline — Bitbucket repository integration
#
# SCENARIO: Your source code lives on Bitbucket Cloud or Bitbucket Server
# (Data Center). This ADO pipeline runs on every pull request targeting main,
# posts an AI review, and comments with the build result.
#
# REQUIRED pipeline variables (mark as secret in ADO):
#
#   For Bitbucket Cloud:
#     BITBUCKET_APP_PASSWORD  — App Password (username:app_password format)
#                               Go to: Bitbucket → Personal settings → App passwords
#                               Required permissions: Repositories (read), Pull requests (read/write)
#
#   For Bitbucket Server / Data Center:
#     BITBUCKET_PAT           — Personal Access Token from your Bitbucket Server
#                               Go to: Profile → Manage account → Personal access tokens
#     BITBUCKET_SERVER_URL    — Your server URL, e.g. https://bitbucket.mycompany.com
#
#   For both:
#     ANTHROPIC_API_KEY       — Anthropic API key
#
# HOW TO USE:
#   1. Copy this file into your repo at any path (e.g. .ado/pr-pipeline.yml)
#   2. Update TARGET_REPO and PROVIDER below for your setup
#   3. In ADO: New Pipeline → Bitbucket Cloud → your repo → Existing YAML file
#   4. Set the secret variables above in pipeline settings
#   5. Open a pull request on Bitbucket → pipeline runs automatically

trigger: none

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  AI_MODEL: claude-sonnet-4-6

  # ── Bitbucket Cloud ──────────────────────────────────────────────────────────
  # PROVIDER: bitbucket
  # TARGET_REPO: myworkspace/myrepo   # Bitbucket workspace/repo slug
  # ACCESS_TOKEN: $(BITBUCKET_APP_PASSWORD)   # format: username:app_password

  # ── Bitbucket Server / Data Center ──────────────────────────────────────────
  PROVIDER: bitbucket-server
  TARGET_REPO: MYPROJECT/myrepo      # Project key/repo slug (project key is UPPERCASE)
  ACCESS_TOKEN: $(BITBUCKET_PAT)
  SERVER_URL: $(BITBUCKET_SERVER_URL)  # e.g. https://bitbucket.mycompany.com

stages:
  - stage: PullRequest
    displayName: AI Review PR
    jobs:
      - job: ReviewPR
        displayName: Review PR on Bitbucket with AI
        steps:

          # Step 1: Post an AI review comment on the open PR
          - task: AiPrReviewer@1
            displayName: AI Review PR
            inputs:
              action: reviewPR
              provider: $(PROVIDER)
              accessToken: $(ACCESS_TOKEN)
              repository: $(TARGET_REPO)
              serverUrl: $(SERVER_URL)         # ignored for Bitbucket Cloud
              prNumber: $(System.PullRequest.PullRequestNumber)
              enableAiReview: true
              aiApiKey: $(ANTHROPIC_API_KEY)
              aiModel: $(AI_MODEL)
              aiReviewContext: |
                Focus on: correctness, security vulnerabilities, and performance issues.
                Flag any hardcoded credentials or sensitive data.
              aiMaxDiffLines: 500

          # Step 2: Print the PR link
          - script: |
              echo "Reviewed PR: $(PrUrl)"
              echo "PR number:   $(System.PullRequest.PullRequestNumber)"
            displayName: Print PR info

          # Step 3: Post build status comment
          - task: AiPrReviewer@1
            displayName: Post build result comment
            condition: always()
            inputs:
              action: commentPR
              provider: $(PROVIDER)
              accessToken: $(ACCESS_TOKEN)
              repository: $(TARGET_REPO)
              serverUrl: $(SERVER_URL)
              prNumber: $(System.PullRequest.PullRequestNumber)
              commentBody: |
                ## Build Result: $(Agent.JobStatus)

                | | |
                |---|---|
                | **Build** | $(Build.BuildNumber) |
                | **Branch** | $(Build.SourceBranchName) |
                | **Status** | $(Agent.JobStatus) |
                | **Pipeline** | [View run]($(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)) |
